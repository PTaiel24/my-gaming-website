    <main class="main_contacto">
        <h1>Contacto</h1>
        <section class="section_form">
            <h2>Formulario De Contacto</h2>
            <form action="./submit" method="post">
                <label for="nombre_usuario">Ingresar su Nombre:</label>
                <br>
                <input type="text" name="nombre_usuario" id="nombre_usuario" placeholder="Ejemplo: Steve">
                <br>
                <label for="email_usuario">Ingrese su Email:</label>
                <br>
                <input type="email" name="email_usuario" id="email_usuario" placeholder="Ejemplo: steve@gmail.com">
                <br>
                <label for="comentario_usuario">Comentario:</label>
                <br>
                <textarea name="comentario_usuario" id="comentario_usuario" placeholder="Ejemplo: Es una gran pagina dedicada a tus juegos"></textarea>
                <br>
                <label for="ubicacion_usuario">Pais:</label>
                <br>
                <select name="pais" id="ubicacion_usuario">
                    <option value="">Seleccione una opcion</option>
                    <option value="">Argentina</option>
                    <option value="">Chile</option>
                    <option value="">Uruguay</option>
                    <option value="">Brasil</option>
                    <option value="">Paraguay</option>
                </select>
                <br>
                <input type="reset" value="Borrar" class="boton_borrar">
                <input type="submit" value="Enviar" class="boton_enviar">
            </form>
        </section>
